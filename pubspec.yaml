name: i_miner
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypt: ^4.3.1
  bcrypt: ^1.2.0
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  http: ^1.3.0
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  intl: ^0.19.0
  pdf: ^3.11.3
  table_calendar: ^3.1.2
  flutter_email_sender: ^7.0.0
  url_launcher: ^6.3.1
  fluttertoast: ^8.2.10
  share_plus: ^10.1.0
  connectivity_plus: ^6.1.0
  internet_connection_checker: ^1.0.0+1
  provider: ^6.1.1
  syncfusion_flutter_pdfviewer: ^32.2.8
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/